<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NINTENDOGS — A Horror Visual Novel</title>
  <meta name="description" content="A horror visual novel clicker about college trauma, dreams, and survival." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%;
      height: 100%;
    }
    body {
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      /* No display:flex — let Phaser's autoCenter:CENTER_BOTH handle margin:auto */
      position: relative;
    }
    /*
     * Phaser Scale Manager injects one <div> as the game container.
     * It uses margin:auto to center the canvas inside it (via CENTER_BOTH).
     * margin:auto ONLY works if the container has a defined width and height.
     * Without this the div collapses to canvas-size and auto-margin has no room.
     * We set exact viewport size and block display so margin:auto kicks in.
     */
    body > div {
      width: 100vw !important;
      height: 100vh !important;
      display: block !important;
      position: relative;
    }
    canvas { display: block; image-rendering: pixelated; }
  </style>

  <!-- Phaser 3 UMD build — exposes global window.Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <script type="module" src="src/main.js"></script>
</body>
</html>
